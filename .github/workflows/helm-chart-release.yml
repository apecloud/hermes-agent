name: Helm Chart Release

on:
  pull_request:
    branches: [apecloud-base]
    paths:
      - "charts/hermes-agent/**"
      - ".github/workflows/helm-chart-release.yml"
  push:
    branches: [apecloud-base]
    paths:
      - "charts/hermes-agent/**"
      - ".github/workflows/helm-chart-release.yml"
  workflow_dispatch:
    inputs:
      chart_version:
        description: "Override Helm chart version. Empty uses Chart.yaml."
        required: false
        default: ""
      app_version:
        description: "Override chart appVersion. Empty uses Chart.yaml."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: helm-chart-release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check-chart:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.16.3

      - name: Lint chart
        run: helm lint charts/hermes-agent

      - name: Template chart
        run: helm template hermes-agent charts/hermes-agent --namespace kb-cloud

      - name: Package chart
        run: helm package charts/hermes-agent --destination /tmp/hermes-agent-chart

  release-chart:
    if: github.event_name != 'pull_request'
    uses: apecloud/apecloud-cd/.github/workflows/release-charts.yml@v0.1.40
    with:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.chart_version || '' }}
      APP_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.app_version || '' }}
      CHART_DIR: charts
      SPECIFY_CHART: hermes-agent
      PUSH_ENABLE: true
      CHECK_ENABLE: false
      ENABLE_JIHU: false
      CHECK_UPLOAD: true
      APECD_REF: v0.1.40
    secrets: inherit
