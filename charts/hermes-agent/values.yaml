replicaCount: 1

image:
  registry: apecloud-registry.cn-zhangjiakou.cr.aliyuncs.com
  repository: apecloud/hermes-agent
  tag: "runtime-manager-v1"
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automountServiceAccountToken: true

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 10000

securityContext: {}

service:
  type: ClusterIP
  port: 8765
  annotations: {}

runtimeManager:
  host: 0.0.0.0
  port: 8765
  pythonExecutable: ""
  usersRoot: /opt/data/users
  apiKey: ""
  logLevel: info
  stopGraceSeconds: 10
  maxActiveRuns: 50
  maxActiveRunsPerUser: 2
  maxEventsPerRun: 1000
  completedRunTtlSeconds: 3600
  allowUnauthenticated: false
  defaultEnabledToolsets:
    - terminal
    - file
  defaultMaxIterations: 20
  defaultProfileDir: ""

secret:
  create: true
  name: ""
  key: runtime-manager-api-key

hermesHome:
  mountPath: /opt/data

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 20Gi
  annotations: {}

extraEnv: []
extraEnvFrom: []
extraVolumes: []
extraVolumeMounts: []

resources: {}

livenessProbe:
  enabled: true
  initialDelaySeconds: 20
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

nodeSelector: {}
tolerations: []
affinity: {}

terminationGracePeriodSeconds: 30
