{{- if .Values.runtimeManager.defaultProfileDir -}}
{{- $files := .Files.Glob "default-profile/**" -}}
{{- if $files }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hermes-agent.defaultProfileConfigMapName" . }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
data:
  {{- range $path, $_ := $files }}
  {{- $relativePath := trimPrefix "default-profile/" $path }}
  {{- $key := replace "/" "__" $relativePath }}
  {{ $key | quote }}: |-
{{ $.Files.Get $path | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
