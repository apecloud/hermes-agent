{{- if .Values.secret.create -}}
{{- $secretName := include "hermes-agent.secretName" . -}}
{{- $currentSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
type: Opaque
data:
  runtime-manager-api-key: {{- if .Values.runtimeManager.apiKey }} {{ .Values.runtimeManager.apiKey | b64enc | quote }}{{- else if and $currentSecret (hasKey $currentSecret.data "runtime-manager-api-key") }} {{ index $currentSecret.data "runtime-manager-api-key" | quote }}{{- else }} {{ randAlphaNum 32 | b64enc | quote }}{{- end }}
{{- end }}
