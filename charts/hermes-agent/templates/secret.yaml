{{- if .Values.secret.create -}}
{{- $secretName := include "hermes-agent.secretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "hermes-agent.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.runtimeManager.existingSecretKey }}: {{- if .Values.runtimeManager.apiKey }} {{ .Values.runtimeManager.apiKey | b64enc | quote }}{{- else if and $existing (hasKey $existing.data .Values.runtimeManager.existingSecretKey) }} {{ index $existing.data .Values.runtimeManager.existingSecretKey | quote }}{{- else }} {{ randAlphaNum 32 | b64enc | quote }}{{- end }}
  {{ .Values.model.existingSecretKey }}: {{ .Values.model.apiKey | default "" | b64enc | quote }}
{{- end }}
